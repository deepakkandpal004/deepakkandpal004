      <text x="490" y="350" fill="#64748b" font-weight="700">STATUS</text><text x="625" y="350" fill="#6ee7b7" font-weight="700">Open to opportunities</text>
      <text x="490" y="384" fill="#64748b" font-weight="700">FOCUS</text><text x="625" y="384" fill="#e2e8f0" font-weight="600">Scalable, production-ready web applications</text>
    </g>
    <text x="490" y="416" fill="#94a3b8" font-size="12" font-weight="700" letter-spacing="1.1">1+ YEAR BUILDING  ·  5+ PROJECTS SHIPPED</text>
    <text x="490" y="447" fill="#94a3b8" font-size="12" font-weight="800" letter-spacing="1.7">CORE STACK</text>
    <g font-size="13" font-weight="700">
