      <g fill="#10241f" stroke="#34d399" stroke-opacity=".42"><rect x="770" y="466" width="76" height="30" rx="15"/><rect x="856" y="466" width="98" height="30" rx="15"/><rect x="964" y="466" width="72" height="30" rx="15"/></g>
      <text x="525" y="486" text-anchor="middle" fill="#67e8f9">React</text><text x="610" y="486" text-anchor="middle" fill="#67e8f9">Next.js</text><text x="710" y="486" text-anchor="middle" fill="#67e8f9">TypeScript</text><text x="808" y="486" text-anchor="middle" fill="#6ee7b7">Node.js</text><text x="905" y="486" text-anchor="middle" fill="#6ee7b7">PostgreSQL</text><text x="1000" y="486" text-anchor="middle" fill="#6ee7b7">Docker</text>
    </g>
