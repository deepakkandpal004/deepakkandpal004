      <text x="233" y="206" font-size="17">       ▓▓▓▓▓▓▓▓▓▓▓</text>
      <text x="233" y="229" font-size="17">     ▓▓▓▒▒▒▒▒▒▒▒▓▓▓</text>
      <text x="233" y="252" font-size="17">    ▓▓▒   ████   ▒▓▓</text>
      <text x="233" y="275" font-size="17">    ▓▒   ◉    ◉   ▒▓</text>
      <text x="233" y="298" font-size="17">    ▓▒      ▴      ▒▓</text>
      <text x="233" y="321" font-size="17">    ▓▒    ▄▄▄▄▄    ▒▓</text>
      <text x="233" y="344" font-size="17">     ▓▓   ▀▀▀▀▀   ▓▓</text>
      <text x="233" y="367" font-size="17">      ▓▓▓▓▓▓▓▓▓▓▓</text>
      <text x="233" y="390" font-size="17">       ╱╲     ╱╲</text>
      <text x="233" y="413" font-size="17">     ╱█████████╲</text>
      <text x="233" y="436" font-size="17">    ╱_____________╲</text>
    </g>
    <rect x="132" y="455" width="202" height="1" fill="url(#accent)" opacity=".75"><animate attributeName="width" values="38;202;38" dur="6s" repeatCount="indefinite"/></rect>
    <text x="233" y="489" text-anchor="middle" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">crafting software with intent</text>
      <text x="233" y="518" text-anchor="middle" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.2">AVAILABLE FOR OPPORTUNITIES</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="490" y="145" fill="#94a3b8" font-size="16" font-weight="600">Hi, I’m</text>
    <text x="490" y="191" fill="#f8fafc" font-size="39" font-weight="750" letter-spacing="-1.2">Deepak <tspan fill="url(#accent)">Kandpal</tspan></text>
    <text x="490" y="216" fill="#64748b" font-size="13" font-weight="600">Clean systems. Thoughtful experiences.</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">
      <g opacity="1"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;.27;.31;1" dur="15s" repeatCount="indefinite"/><text x="490" y="248" fill="#67e8f9">Full Stack Developer</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.31;.35;.62;.66;1" dur="15s" repeatCount="indefinite"/><text x="490" y="248" fill="#a78bfa">React &amp; Next.js Developer</text></g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.66;.70;1" dur="15s" repeatCount="indefinite"/><text x="490" y="248" fill="#6ee7b7">Production Web Builder</text></g>
      <rect x="760" y="228" width="2" height="23" fill="#67e8f9"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
