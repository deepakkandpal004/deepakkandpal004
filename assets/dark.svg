<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title description">
  <title id="title">Deepak Kandpal — Full Stack Developer</title>
  <desc id="description">A premium developer profile banner with Deepak Kandpal's profile, skills, and contact links.</desc>
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000713" flood-opacity=".42"/></filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#030712"/><stop offset=".52" stop-color="#081224"/><stop offset="1" stop-color="#030712"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101d33" stop-opacity=".94"/><stop offset="1" stop-color="#0a1324" stop-opacity=".76"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#8b5cf6"/><stop offset=".48" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/><animate attributeName="x1" values="0;1;0" dur="14s" repeatCount="indefinite"/><animate attributeName="x2" values="1;2;1" dur="14s" repeatCount="indefinite"/></linearGradient>
    <linearGradient id="portrait" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#d9fbff"/><stop offset=".55" stop-color="#5eead4"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <radialGradient id="violet"><stop stop-color="#7c3aed" stop-opacity=".34"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <radialGradient id="cyan"><stop stop-color="#22d3ee" stop-opacity=".22"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#e2e8f0" stroke-opacity=".035"/></pattern>
    <clipPath id="leftClip"><rect x="40" y="40" width="386" height="530" rx="24"/></clipPath>
    <clipPath id="roleOne"><rect x="490" y="213" width="0" height="30"><animate attributeName="width" values="0;220;220;0;0;0;0;0" keyTimes="0;.08;.28;.32;.333;.666;.999;1" dur="18s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="roleTwo"><rect x="490" y="213" width="0" height="30"><animate attributeName="width" values="0;0;0;0;0;265;265;0" keyTimes="0;.333;.35;.41;.58;.66;.94;1" dur="18s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="roleThree"><rect x="490" y="213" width="0" height="30"><animate attributeName="width" values="0;0;0;0;0;0;245;0" keyTimes="0;.666;.68;.74;.82;.85;.94;1" dur="18s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <rect width="1180" height="610" rx="28" fill="url(#bg)"/>
  <rect width="1180" height="610" rx="28" fill="url(#grid)"/>
  <circle cx="190" cy="145" r="250" fill="url(#violet)" filter="url(#blur)"><animateTransform attributeName="transform" type="translate" values="0 0;28 16;0 0" dur="18s" repeatCount="indefinite"/></circle>
  <circle cx="1000" cy="475" r="270" fill="url(#cyan)" filter="url(#blur)"><animateTransform attributeName="transform" type="translate" values="0 0;-32 -20;0 0" dur="21s" repeatCount="indefinite"/></circle>
  <rect x="20" y="20" width="1140" height="570" rx="30" fill="none" stroke="#f8fafc" stroke-opacity=".075"/>

