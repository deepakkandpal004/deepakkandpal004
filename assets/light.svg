<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title description">
  <title id="title">Deepak Kandpal &#x2014; Full Stack Developer</title>
  <desc id="description">A premium developer profile banner with Deepak Kandpal's profile, skills, and contact links.</desc>
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#334155" flood-opacity=".13"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity=".88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2563eb"/>
      <stop offset=".48" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#10b981"/>
      <animate attributeName="x1" values="0;1;0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="portrait" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="blue">
      <stop stop-color="#2563eb" stop-opacity=".14"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mint">
      <stop stop-color="#10b981" stop-opacity=".12"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#0f172a" stroke-opacity=".045"/>
    </pattern>
    <clipPath id="leftClip">
      <rect x="40" y="40" width="386" height="530" rx="24"/>
    </clipPath>
    <clipPath id="roleOne">
      <rect x="490" y="213" width="0" height="30">
        <animate attributeName="width" values="0;220;220;0;0;0;0;0" keyTimes="0;.08;.28;.32;.333;.666;.999;1" dur="18s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="roleTwo">
      <rect x="490" y="213" width="0" height="30">
        <animate attributeName="width" values="0;0;0;0;0;265;265;0" keyTimes="0;.333;.35;.41;.58;.66;.94;1" dur="18s" repeatCount="indefinite"/>
